<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Romane Long — Animation Photo</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 40% 60%, #0a9dab 0%, #0d7a85 25%, #074a5c 55%, #03232d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── SCENE ── */
    .scene {
      position: relative;
      width: 400px;
      height: 600px;
    }

    /* ── LENS FLARES ── */
    .flare {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: flare-pulse 3s ease-in-out infinite;
    }
    .flare--1 {
      width: 180px; height: 12px;
      background: linear-gradient(90deg, transparent, rgba(255,180,60,.7), rgba(255,100,200,.5), rgba(100,200,255,.7), transparent);
      top: 52%; left: 30%;
      transform: rotate(-30deg);
      animation-delay: 0s;
    }
    .flare--2 {
      width: 120px; height: 8px;
      background: linear-gradient(90deg, transparent, rgba(180,255,100,.6), rgba(255,80,180,.5), transparent);
      top: 65%; left: 45%;
      transform: rotate(20deg);
      animation-delay: 0.8s;
    }
    .flare--3 {
      width: 60px; height: 60px;
      background: radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(200,255,255,.4) 40%, transparent 70%);
      top: 48%; left: 42%;
      filter: blur(2px);
      animation-delay: 0.4s;
    }
    @keyframes flare-pulse {
      0%, 100% { opacity: .6; transform: scale(1) rotate(var(--r, -30deg)); }
      50%       { opacity: 1;  transform: scale(1.1) rotate(var(--r, -30deg)); }
    }

    /* ── ORBIT RINGS ── */
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1.5px solid rgba(180, 255, 240, .35);
      box-shadow: 0 0 12px rgba(100, 255, 220, .15);
      transform-origin: center center;
      animation: orbit-spin linear infinite;
    }
    .orbit::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: conic-gradient(rgba(100,255,220,.5) 0deg, transparent 60deg, transparent 300deg, rgba(100,255,220,.5) 360deg);
      opacity: .5;
    }
    .orbit--1 {
      width: 340px; height: 120px;
      margin: -60px 0 0 -170px;
      animation-duration: 8s;
      transform: rotateX(70deg) rotateZ(0deg);
    }
    .orbit--2 {
      width: 380px; height: 140px;
      margin: -70px 0 0 -190px;
      animation-duration: 12s;
      animation-direction: reverse;
      transform: rotateX(70deg) rotateZ(25deg);
    }
    @keyframes orbit-spin {
      from { transform: rotateX(70deg) rotateZ(0deg); }
      to   { transform: rotateX(70deg) rotateZ(360deg); }
    }

    /* ── CENTRAL PHOTO (avatar) ── */
    .central-photo {
      position: absolute;
      top: 50%; left: 50%;
      width: 180px; height: 220px;
      margin: -110px 0 0 -90px;
      border-radius: 20px;
      background: linear-gradient(160deg, #b8d4c8 0%, #7aa8a0 40%, #4a7a74 100%);
      box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 0 0 2px rgba(255,255,255,.15);
      overflow: hidden;
      z-index: 10;
    }
    .central-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.3) 100%);
    }
    /* Simulated silhouette */
    .central-photo__silhouette {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 170px;
      background: linear-gradient(180deg, #d4b5a0 0%, #c9a482 30%, #3d2a1e 100%);
      border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    }

    /* ── INSTAGRAM CARD ── */
    .ig-card {
      position: absolute;
      top: 18%; left: 52%;
      width: 185px;
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 16px;
      padding: 12px;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.2);
      animation: ig-float 4s ease-in-out infinite;
    }
    .ig-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .ig-card__avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9a825, #e91e8c, #673ab7);
      box-shadow: 0 0 0 2px rgba(255,255,255,.5);
    }
    .ig-card__name {
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .ig-card__lock { color: rgba(255,255,255,.6); font-size: 8px; }
    .ig-card__stats {
      display: flex;
      gap: 8px;
      margin: 6px 0;
    }
    .ig-stat { text-align: center; }
    .ig-stat__num { color: #fff; font-size: 9px; font-weight: 700; display: block; }
    .ig-stat__label { color: rgba(255,255,255,.6); font-size: 7px; }
    .ig-card__location { color: rgba(255,255,255,.7); font-size: 8px; margin-bottom: 6px; }
    .ig-card__btn {
      display: block;
      width: 100%;
      padding: 5px;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 8px;
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    @keyframes ig-float {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-8px) rotate(1deg); }
    }

    /* ── BUBBLE PHOTOS ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.4);
      border: 2px solid rgba(255,255,255,.4);
      animation: bubble-float ease-in-out infinite, bubble-orbit linear infinite;
      z-index: 15;
    }
    .bubble::after {
      content: '';
      position: absolute;
      top: 8%; left: 15%;
      width: 30%; height: 20%;
      background: rgba(255,255,255,.35);
      border-radius: 50%;
      filter: blur(3px);
    }
    .bubble-inner {
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
    }

    /* individual bubbles */
    .bubble--1 { width: 70px; height: 70px; top: 22%; left: 5%;  animation-duration: 5s, 10s; animation-delay: 0s, 0s; }
    .bubble--2 { width: 55px; height: 55px; top: 60%; left: 3%;  animation-duration: 4s, 14s; animation-delay: 1s, -2s; }
    .bubble--3 { width: 80px; height: 80px; top: 72%; left: 62%; animation-duration: 6s, 12s; animation-delay: 0.5s, -4s; }
    .bubble--4 { width: 50px; height: 50px; top: 30%; left: 78%; animation-duration: 4.5s, 9s; animation-delay: 1.5s, -6s; }
    .bubble--5 { width: 65px; height: 65px; top: 10%; left: 60%; animation-duration: 5.5s, 11s; animation-delay: 0.8s, -8s; }
    .bubble--6 { width: 45px; height: 45px; top: 52%; left: 80%; animation-duration: 3.5s, 8s; animation-delay: 2s, -3s; }

    @keyframes bubble-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes bubble-orbit {
      0%   { filter: brightness(1);   }
      50%  { filter: brightness(1.2); }
      100% { filter: brightness(1);   }
    }

    /* Bubble photo gradients (simulating photos) */
    .bubble--1 .bubble-inner { background: linear-gradient(160deg, #2d1b3d 0%, #4a2060 50%, #1a0d2e 100%); }
    .bubble--2 .bubble-inner { background: linear-gradient(160deg, #1a3a4a 0%, #0d6b7a 50%, #083040 100%); }
    .bubble--3 .bubble-inner { background: linear-gradient(160deg, #3d3030 0%, #6b4040 50%, #2e2020 100%); }
    .bubble--4 .bubble-inner { background: linear-gradient(160deg, #1a3a2a 0%, #2d6b4a 50%, #0d2820 100%); }
    .bubble--5 .bubble-inner { background: linear-gradient(160deg, #3d3020 0%, #7a6030 50%, #2e2010 100%); }
    .bubble--6 .bubble-inner { background: linear-gradient(160deg, #2a2a3d 0%, #4a4a70 50%, #1a1a2e 100%); }

    /* ── FLAT PHOTO CARDS (outside the orbit) ── */
    .photo-card {
      position: absolute;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,.45);
      border: 2px solid rgba(255,255,255,.2);
      animation: card-float ease-in-out infinite;
      z-index: 8;
    }
    .photo-card__inner {
      width: 100%; height: 100%;
      background-size: cover;
    }
    .photo-card--1 { width: 75px; height: 100px; top: 8%;  left: 2%;  animation-duration: 6s;   animation-delay: 0.3s; }
    .photo-card--2 { width: 70px; height: 90px;  top: 48%; left: 0%;  animation-duration: 5s;   animation-delay: 1.2s; }
    .photo-card--3 { width: 80px; height: 60px;  top: 8%;  left: 74%; animation-duration: 7s;   animation-delay: 0.7s; }
    .photo-card--4 { width: 85px; height: 55px;  top: 80%; left: 68%; animation-duration: 5.5s; animation-delay: 1.8s; }

    .photo-card--1 .photo-card__inner { background: linear-gradient(180deg, #c8c0b0 0%, #8a7060 50%, #3a2820 100%); }
    .photo-card--2 .photo-card__inner { background: linear-gradient(180deg, #b0b8c0 0%, #607888 50%, #202a30 100%); }
    .photo-card--3 .photo-card__inner { background: linear-gradient(180deg, #d4e0d0 0%, #8aaa90 50%, #304838 100%); }
    .photo-card--4 .photo-card__inner { background: linear-gradient(180deg, #c0c0c0 0%, #707070 50%, #202020 100%); }

    @keyframes card-float {
      0%, 100% { transform: translateY(0) rotate(var(--card-rot, -4deg)); }
      50%       { transform: translateY(-10px) rotate(calc(var(--card-rot, -4deg) * -1)); }
    }
    .photo-card--1 { --card-rot: -6deg; }
    .photo-card--2 { --card-rot: 4deg; }
    .photo-card--3 { --card-rot: 5deg; }
    .photo-card--4 { --card-rot: -3deg; }

    /* ── SPARKLES ── */
    .sparkle {
      position: absolute;
      pointer-events: none;
      animation: sparkle-anim ease-in-out infinite;
    }
    .sparkle::before, .sparkle::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,.9);
      border-radius: 2px;
    }
    .sparkle::before { width: 2px; height: 14px; top: -7px; left: 0; }
    .sparkle::after  { width: 14px; height: 2px; top: 0; left: -7px; }

    .sparkle--1 { top: 15%; left: 85%; animation-duration: 2s;   animation-delay: 0s; }
    .sparkle--2 { top: 75%; left: 90%; animation-duration: 2.5s; animation-delay: 0.6s; }
    .sparkle--3 { top: 85%; left: 20%; animation-duration: 1.8s; animation-delay: 1.1s; }

    @keyframes sparkle-anim {
      0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
      50%       { opacity: 1; transform: scale(1) rotate(45deg); }
    }

    /* ── PARTICLES ── */
    .particles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(100, 255, 220, .5);
      animation: particle-drift linear infinite;
    }
    @keyframes particle-drift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: .8; }
      90%  { opacity: .5; }
      100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
    }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed;
      top: 20px; left: 20px;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .5px;
      transition: color .2s;
      z-index: 100;
    }
    .back-link:hover { color: #fff; }
  </style>
</head>
<body>

<a href="index.html" class="back-link">← Portfolio</a>

<div class="scene">

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Orbit rings -->
  <div class="orbit orbit--1"></div>
  <div class="orbit orbit--2"></div>

  <!-- Lens flares -->
  <div class="flare flare--1"></div>
  <div class="flare flare--2"></div>
  <div class="flare flare--3"></div>

  <!-- Flat photo cards -->
  <div class="photo-card photo-card--1"><div class="photo-card__inner"></div></div>
  <div class="photo-card photo-card--2"><div class="photo-card__inner"></div></div>
  <div class="photo-card photo-card--3"><div class="photo-card__inner"></div></div>
  <div class="photo-card photo-card--4"><div class="photo-card__inner"></div></div>

  <!-- Central photo -->
  <div class="central-photo">
    <div class="central-photo__silhouette"></div>
  </div>

  <!-- Instagram card -->
  <div class="ig-card">
    <div class="ig-card__header">
      <div class="ig-card__avatar"></div>
      <div>
        <div class="ig-card__lock">🔒 romane.long</div>
        <div class="ig-card__name">Romane ✨</div>
      </div>
    </div>
    <div class="ig-card__stats">
      <div class="ig-stat">
        <span class="ig-stat__num">3</span>
        <span class="ig-stat__label">publications</span>
      </div>
      <div class="ig-stat">
        <span class="ig-stat__num">623</span>
        <span class="ig-stat__label">followers</span>
      </div>
      <div class="ig-stat">
        <span class="ig-stat__num">912</span>
        <span class="ig-stat__label">suivi(e)s</span>
      </div>
    </div>
    <div class="ig-card__location">📍 Marseille, Paris</div>
    <div class="ig-card__btn">Modifier</div>
  </div>

  <!-- Orbiting bubbles -->
  <div class="bubble bubble--1"><div class="bubble-inner"></div></div>
  <div class="bubble bubble--2"><div class="bubble-inner"></div></div>
  <div class="bubble bubble--3"><div class="bubble-inner"></div></div>
  <div class="bubble bubble--4"><div class="bubble-inner"></div></div>
  <div class="bubble bubble--5"><div class="bubble-inner"></div></div>
  <div class="bubble bubble--6"><div class="bubble-inner"></div></div>

  <!-- Sparkles -->
  <div class="sparkle sparkle--1"></div>
  <div class="sparkle sparkle--2"></div>
  <div class="sparkle sparkle--3"></div>

</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${50 + Math.random() * 50}%;
      animation-duration: ${4 + Math.random() * 6}s;
      animation-delay: ${-Math.random() * 8}s;
      width: ${2 + Math.random() * 3}px;
      height: ${2 + Math.random() * 3}px;
      background: rgba(${Math.random() > .5 ? '100,255,220' : '180,100,255'}, ${.3 + Math.random() * .5});
    `;
    container.appendChild(p);
  }

  // Add subtle mouse parallax
  document.addEventListener('mousemove', (e) => {
    const { innerWidth: W, innerHeight: H } = window;
    const dx = (e.clientX / W - .5) * 18;
    const dy = (e.clientY / H - .5) * 12;
    document.querySelector('.scene').style.transform = `translate(${dx}px, ${dy}px)`;
  });
</script>
</body>
</html>
