<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Romane ✨</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}

/* ── PHOTO BASE ── */
#photo-bg{
  position:fixed;
  inset:0;
  background-image:url('romane.jpg');
  background-size:cover;
  background-position:center top;
  /* fallback si pas de photo */
  background-color:#0a9dab;
  will-change:transform;
  transition:transform .08s linear;
}
/* Gradient subtil au bas pour profondeur */
#photo-bg::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.25)100%);
}

/* ── CALQUES PARALLAXE ── */
.layer{
  position:fixed;
  inset:0;
  will-change:transform;
  transition:transform .08s linear;
  pointer-events:none;
}

/* ── ANNEAUX ORBITAUX ── */
#rings{
  display:flex;align-items:center;justify-content:center;
}
.ring{
  position:absolute;
  border-radius:50%;
  border:1.5px solid rgba(160,255,235,.4);
  box-shadow:0 0 20px rgba(60,220,200,.2),inset 0 0 20px rgba(60,220,200,.05);
  animation:ring-spin linear infinite;
}
.ring::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:50%;
  background:conic-gradient(
    rgba(80,255,220,.7) 0deg,
    transparent 40deg,
    transparent 320deg,
    rgba(80,255,220,.7) 360deg
  );
  border-radius:50%;
}
.ring-1{
  width:72vw;height:26vw;
  transform:rotateX(72deg);
  animation-duration:9s;
}
.ring-2{
  width:82vw;height:30vw;
  transform:rotateX(72deg) rotateZ(30deg);
  animation-duration:13s;
  animation-direction:reverse;
  border-color:rgba(180,140,255,.35);
}
.ring-2::before{
  background:conic-gradient(
    rgba(200,120,255,.7) 0deg,
    transparent 40deg,
    transparent 320deg,
    rgba(200,120,255,.7) 360deg
  );
}
/* centrer les rings verticalement sur le sujet */
#rings{top:30%;height:40%;}

@keyframes ring-spin{
  from{transform:rotateX(72deg) rotateZ(0deg)}
  to  {transform:rotateX(72deg) rotateZ(360deg)}
}
.ring-2{animation-name:ring-spin2}
@keyframes ring-spin2{
  from{transform:rotateX(72deg) rotateZ(30deg)}
  to  {transform:rotateX(72deg) rotateZ(390deg)}
}

/* ── BULLES ── */
.bubble{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.45);
  box-shadow:
    0 4px 20px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -1px 0 rgba(0,0,0,.2);
  overflow:hidden;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
  animation:bfloat ease-in-out infinite;
}
.bubble::after{
  content:'';
  position:absolute;
  top:10%;left:18%;
  width:28%;height:18%;
  background:rgba(255,255,255,.45);
  border-radius:50%;
  filter:blur(3px);
  transform:rotate(-30deg);
}
.bubble-inner{
  width:100%;height:100%;
  background-size:cover;background-position:center;
  border-radius:50%;
}

/* positions sur mobile (vw/vh) */
.b1{width:18vw;height:18vw;left:4vw;top:18vh;animation-duration:4.8s;animation-delay:0s}
.b2{width:14vw;height:14vw;left:6vw;top:58vh;animation-duration:3.9s;animation-delay:1.1s}
.b3{width:20vw;height:20vw;left:72vw;top:14vh;animation-duration:5.2s;animation-delay:.4s}
.b4{width:13vw;height:13vw;left:78vw;top:50vh;animation-duration:4.1s;animation-delay:1.6s}
.b5{width:16vw;height:16vw;left:62vw;top:68vh;animation-duration:4.6s;animation-delay:.9s}
.b6{width:11vw;height:11vw;left:18vw;top:75vh;animation-duration:3.5s;animation-delay:2s}

.b1 .bubble-inner{background:linear-gradient(160deg,#2d1b3d,#6030a0,#1a0d2e)}
.b2 .bubble-inner{background:linear-gradient(160deg,#1a3a4a,#0d6b7a,#083040)}
.b3 .bubble-inner{background:linear-gradient(160deg,#3d3020,#7a6030,#2e2010)}
.b4 .bubble-inner{background:linear-gradient(160deg,#3d3030,#6b4040,#2e2020)}
.b5 .bubble-inner{background:linear-gradient(160deg,#1a3a2a,#2d6b4a,#0d2820)}
.b6 .bubble-inner{background:linear-gradient(160deg,#2a2a3d,#4a4a70,#1a1a2e)}

@keyframes bfloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
}

/* ── CARTES PHOTOS PLATES ── */
.pcard{
  position:absolute;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  border:2px solid rgba(255,255,255,.2);
  animation:cfloat ease-in-out infinite;
}
.pcard-inner{width:100%;height:100%;background-size:cover}

.pc1{width:18vw;height:24vw;left:2vw;top:8vh;animation-duration:6.5s;animation-delay:.2s;--rot:-6deg}
.pc2{width:16vw;height:21vw;left:3vw;top:46vh;animation-duration:5.2s;animation-delay:1.3s;--rot:4deg}
.pc3{width:20vw;height:14vw;left:74vw;top:8vh;animation-duration:7s;animation-delay:.7s;--rot:5deg}
.pc4{width:22vw;height:14vw;left:70vw;top:78vh;animation-duration:5.8s;animation-delay:1.9s;--rot:-3deg}

.pc1 .pcard-inner{background:linear-gradient(180deg,#c8c0b0,#8a7060,#3a2820)}
.pc2 .pcard-inner{background:linear-gradient(180deg,#b0b8c0,#607888,#202a30)}
.pc3 .pcard-inner{background:linear-gradient(180deg,#d4e0d0,#8aaa90,#304838)}
.pc4 .pcard-inner{background:linear-gradient(180deg,#c0c0c0,#707070,#202020)}

@keyframes cfloat{
  0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}
  50%{transform:translateY(-10px) rotate(calc(var(--rot,0deg) * -1))}
}

/* ── CARTE INSTAGRAM ── */
#ig-card{
  position:absolute;
  right:4vw;top:18vh;
  width:44vw;max-width:200px;
  background:rgba(255,255,255,.13);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border:1px solid rgba(255,255,255,.3);
  border-radius:16px;
  padding:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25);
  animation:igfloat 4.5s ease-in-out infinite;
  pointer-events:none;
}
.ig-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ig-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#f9a825,#e91e8c,#673ab7);
  box-shadow:0 0 0 2px rgba(255,255,255,.5);
}
.ig-name{color:#fff;font-size:9px;font-weight:700;font-family:system-ui}
.ig-lock{color:rgba(255,255,255,.6);font-size:7px;font-family:system-ui}
.ig-stats{display:flex;gap:6px;margin-bottom:6px}
.ig-s{text-align:center}
.ig-s-n{color:#fff;font-size:9px;font-weight:700;display:block;font-family:system-ui}
.ig-s-l{color:rgba(255,255,255,.6);font-size:6px;font-family:system-ui}
.ig-loc{color:rgba(255,255,255,.7);font-size:7px;margin-bottom:6px;font-family:system-ui}
.ig-btn{
  display:block;width:100%;padding:4px;
  background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.4);
  border-radius:8px;
  color:#fff;font-size:8px;font-weight:700;
  text-align:center;font-family:system-ui;
}
@keyframes igfloat{
  0%,100%{transform:translateY(0) rotate(-1.5deg)}
  50%{transform:translateY(-10px) rotate(1.5deg)}
}

/* ── LENS FLARE ── */
#flares{mix-blend-mode:screen;pointer-events:none}
.flare{
  position:absolute;
  border-radius:50%;
  animation:fpulse 3s ease-in-out infinite;
}
.f1{
  width:60vw;height:10px;
  background:linear-gradient(90deg,transparent,rgba(255,180,60,.7),rgba(255,100,200,.5),rgba(100,200,255,.7),transparent);
  top:52%;left:20%;
  transform:rotate(-25deg);
}
.f2{
  width:40vw;height:6px;
  background:linear-gradient(90deg,transparent,rgba(180,255,100,.6),rgba(255,80,180,.5),transparent);
  top:64%;left:35%;
  transform:rotate(18deg);
  animation-delay:.9s;
}
.f3{
  width:15vw;height:15vw;
  background:radial-gradient(circle,rgba(255,255,255,.9)0%,rgba(200,255,255,.4)40%,transparent 70%);
  top:48%;left:38%;
  filter:blur(3px);
  animation-delay:.4s;
}
@keyframes fpulse{
  0%,100%{opacity:.55}
  50%{opacity:1}
}

/* ── SPARKLES ── */
.sparkle{
  position:absolute;
  pointer-events:none;
  animation:spark ease-in-out infinite;
}
.sparkle::before,.sparkle::after{
  content:'';position:absolute;
  background:rgba(255,255,255,.95);border-radius:2px;
}
.sparkle::before{width:2px;height:16px;top:-8px;left:0}
.sparkle::after{width:16px;height:2px;top:0;left:-8px}
.sp1{top:12%;left:88%;animation-duration:2s;animation-delay:0s}
.sp2{top:78%;left:88%;animation-duration:2.5s;animation-delay:.7s}
.sp3{top:85%;left:14%;animation-duration:1.9s;animation-delay:1.2s}
.sp4{top:5%;left:40%;animation-duration:2.2s;animation-delay:.4s}
@keyframes spark{
  0%,100%{opacity:0;transform:scale(.4) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(45deg)}
}

/* ── PARTICULES ── */
.particle{
  position:absolute;
  border-radius:50%;
  animation:pdrift linear infinite;
  pointer-events:none;
}
@keyframes pdrift{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:.9}
  90%{opacity:.4}
  100%{transform:translateY(-140px) translateX(20px);opacity:0}
}

/* ── OVERLAY GYRO HINT ── */
#gyro-hint{
  position:fixed;
  bottom:6vh;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:8px 18px;
  color:rgba(255,255,255,.75);
  font-size:11px;
  font-family:system-ui;
  letter-spacing:.5px;
  pointer-events:none;
  animation:hint-fade 1s ease .5s both;
  z-index:100;
}
@keyframes hint-fade{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── PERMISSION BUTTON ── */
#perm-btn{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(10px);
  z-index:200;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
#perm-btn button{
  background:linear-gradient(135deg,#00d4b8,#7c3aed);
  border:none;border-radius:40px;
  color:#fff;font-size:15px;font-weight:700;
  padding:16px 36px;
  cursor:pointer;font-family:system-ui;
  box-shadow:0 8px 30px rgba(0,212,184,.4);
}
#perm-btn p{color:rgba(255,255,255,.8);font-family:system-ui;font-size:13px;text-align:center;padding:0 30px}
</style>
</head>
<body>

<!-- Permission overlay pour iOS -->
<div id="perm-btn">
  <p>Autorise le gyroscope pour l'effet de profondeur</p>
  <button onclick="requestGyro()">Activer le gyroscope</button>
</div>

<!-- CALQUE 0 : photo de fond (bouge très peu) -->
<div id="photo-bg" class="layer" data-speed="0.4"></div>

<!-- CALQUE 1 : anneaux orbitaux (vitesse moyenne) -->
<div class="layer" id="rings" data-speed="1.4">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
</div>

<!-- CALQUE 2 : lens flares -->
<div class="layer" id="flares" data-speed="1.8">
  <div class="flare f1"></div>
  <div class="flare f2"></div>
  <div class="flare f3"></div>
</div>

<!-- CALQUE 3 : cartes photos plates (éloignées) -->
<div class="layer" id="pcards" data-speed="2.2">
  <div class="pcard pc1"><div class="pcard-inner"></div></div>
  <div class="pcard pc2"><div class="pcard-inner"></div></div>
  <div class="pcard pc3"><div class="pcard-inner"></div></div>
  <div class="pcard pc4"><div class="pcard-inner"></div></div>
</div>

<!-- CALQUE 4 : bulles (plus proches) -->
<div class="layer" id="bubbles" data-speed="3">
  <div class="bubble b1"><div class="bubble-inner"></div></div>
  <div class="bubble b2"><div class="bubble-inner"></div></div>
  <div class="bubble b3"><div class="bubble-inner"></div></div>
  <div class="bubble b4"><div class="bubble-inner"></div></div>
  <div class="bubble b5"><div class="bubble-inner"></div></div>
  <div class="bubble b6"><div class="bubble-inner"></div></div>
</div>

<!-- CALQUE 5 : carte Instagram (premier plan) -->
<div class="layer" data-speed="4">
  <div id="ig-card">
    <div class="ig-head">
      <div class="ig-avatar"></div>
      <div>
        <div class="ig-lock">🔒 romane.long</div>
        <div class="ig-name">Romane ✨</div>
      </div>
    </div>
    <div class="ig-stats">
      <div class="ig-s"><span class="ig-s-n">3</span><span class="ig-s-l">publications</span></div>
      <div class="ig-s"><span class="ig-s-n">623</span><span class="ig-s-l">followers</span></div>
      <div class="ig-s"><span class="ig-s-n">912</span><span class="ig-s-l">suivi(e)s</span></div>
    </div>
    <div class="ig-loc">📍 Marseille, Paris</div>
    <div class="ig-btn">Modifier</div>
  </div>
</div>

<!-- CALQUE 6 : sparkles + particules -->
<div class="layer" id="sparks" data-speed="3.5">
  <div class="sparkle sp1"></div>
  <div class="sparkle sp2"></div>
  <div class="sparkle sp3"></div>
  <div class="sparkle sp4"></div>
</div>

<div id="gyro-hint">📱 Bouge ton téléphone pour regarder autour</div>

<script>
// ── Particules dynamiques ──
const sparks = document.getElementById('sparks');
for(let i=0;i<20;i++){
  const p = document.createElement('div');
  p.className='particle';
  const c = Math.random()>.5 ? `100,255,220` : `180,100,255`;
  const s = 2+Math.random()*4;
  p.style.cssText=`
    left:${Math.random()*100}%;
    top:${40+Math.random()*55}%;
    width:${s}px;height:${s}px;
    background:rgba(${c},${.4+Math.random()*.5});
    animation-duration:${4+Math.random()*7}s;
    animation-delay:${-Math.random()*9}s;
  `;
  sparks.appendChild(p);
}

// ── Gyroscope / parallaxe ──
const layers = [...document.querySelectorAll('.layer')];
let curX=0, curY=0;
let tgtX=0, tgtY=0;
const MAX=28; // degrés max considérés

function applyParallax(x,y){
  layers.forEach(l=>{
    const s = parseFloat(l.dataset.speed||1);
    l.style.transform = `translate(${x*s}px, ${y*s}px)`;
  });
}

// Animation loop (smooth lerp)
function loop(){
  curX += (tgtX-curX)*.08;
  curY += (tgtY-curY)*.08;
  applyParallax(curX,curY);
  requestAnimationFrame(loop);
}
loop();

function onOrientation(e){
  // gamma = gauche/droite (-90 à 90), beta = avant/arrière (0 à 180)
  const gamma = Math.max(-MAX, Math.min(MAX, e.gamma||0));
  const beta  = Math.max(-MAX, Math.min(MAX, (e.beta||0)-45)); // 45° = position naturelle
  tgtX = (gamma/MAX)*18;  // ±18px pour le layer 1x
  tgtY = (beta /MAX)*12;
}

function startGyro(){
  window.addEventListener('deviceorientation', onOrientation, true);
  document.getElementById('gyro-hint').textContent = '✨ Bouge ton téléphone !';
  setTimeout(()=>{
    document.getElementById('gyro-hint').style.opacity='0';
  }, 3000);
}

function requestGyro(){
  document.getElementById('perm-btn').style.display='none';
  if(typeof DeviceOrientationEvent!=='undefined' &&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(r=>{ if(r==='granted') startGyro(); })
      .catch(()=>{});
  } else {
    startGyro();
  }
}

// Démarrage auto (Android / navigateurs sans permission)
if(typeof DeviceOrientationEvent!=='undefined'){
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    // iOS 13+ : besoin d'un geste utilisateur
    document.getElementById('perm-btn').style.display='flex';
  } else {
    // Android / autres : auto
    startGyro();
  }
} else {
  // Desktop fallback : souris
  document.addEventListener('mousemove',e=>{
    tgtX = (e.clientX/window.innerWidth-.5)*30;
    tgtY = (e.clientY/window.innerHeight-.5)*20;
  });
  document.getElementById('gyro-hint').textContent = '🖱️ Bouge ta souris pour l\'effet';
}

// Touch fallback pour iPhone sans permission
document.addEventListener('touchmove',e=>{
  const t = e.touches[0];
  tgtX = (t.clientX/window.innerWidth-.5)*30;
  tgtY = (t.clientY/window.innerHeight-.5)*20;
},{passive:true});
</script>
</body>
</html>
